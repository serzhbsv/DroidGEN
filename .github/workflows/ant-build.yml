name: Build with Ant (Legacy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Устанавливаем JDK 17 (вместо 11)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 2. Настраиваем Android SDK с обходом проблем
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      env:
        # Принудительно используем Node.js 20 (временное решение)
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        # Пропускаем проверку версии JDK (мы уже установили 17)
        SKIP_JDK_VERSION_CHECK: true

    - name: Install old SDK components (API 17)
      run: |
        # Используем обновлённый sdkmanager
        export JAVA_HOME=$JAVA_HOME_17_X64
        echo "y" | sdkmanager "platforms;android-17"
        echo "y" | sdkmanager "build-tools;30.0.3"
        echo "y" | sdkmanager "platform-tools"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Set up Android NDK r21
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        echo "y" | sdkmanager "ndk;21.4.7075529"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV

    - name: Build native code with NDK
      run: |
        cd jni
        $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk

    - name: Copy .so files to libs
      run: |
        mkdir -p libs/armeabi-v7a
        find . -name "*.so" -exec cp {} libs/armeabi-v7a/ \;

    - name: Create minimal resources for Ant
      run: |
        mkdir -p res/values
        mkdir -p res/drawable

        cat > res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">DroidGEN</string>
            <string name="loadRomButtonLabel">Load ROM</string>
            <string name="resumeButtonLabel">Resume</string>
            <string name="settingButtonLabel">Settings</string>
            <string name="exitButtonLabel">Exit</string>
            <string name="package_name">com.droidhits.genesisdroid</string>
        </resources>
        EOF

        cat > res/values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.DroidGEN" parent="android:Theme.Light.NoTitleBar">
                <item name="android:windowBackground">@android:color/black</item>
            </style>
        </resources>
        EOF

        cat > res/drawable/ic_launcher.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="rectangle">
            <solid android:color="#FF4444" />
            <corners android:radius="8dp" />
            <padding android:left="4dp" android:top="4dp" android:right="4dp" android:bottom="4dp" />
        </shape>
        EOF

    - name: Fix MainActivity.java for Ant
      run: |
        sed -i 's|getString(R.string.package_name)|"com.droidhits.genesisdroid"|g' src/com/droidhits/genesisdroid/MainActivity.java

    - name: Update project for Ant
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        android update project -p . --target android-17

    - name: Build with Ant
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        ant debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: DroidGEN-Ant
        path: bin/*.apk
