name: Build DroidGEN with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        SKIP_JDK_VERSION_CHECK: true

    - name: Set up Android NDK 25.2
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install SDK components
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    # ============ ОЧИСТКА КЭША ============
    - name: Clean build cache
      run: |
        rm -rf build/intermediates/cxx
        rm -rf .cxx

    # ============ ИСПРАВЛЕНИЕ: CLOCK_REALTIME_HR ============
    - name: Fix CLOCK_REALTIME_HR in native code
      run: |
        find jni -type f \( -name "*.c" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) -exec sed -i 's/CLOCK_REALTIME_HR/CLOCK_REALTIME/g' {} \;

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: DroidGEN-debug
        path: build/outputs/apk/debug/*.apk