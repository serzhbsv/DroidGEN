name: Build DroidGEN with Gradle (Fully Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        SKIP_JDK_VERSION_CHECK: true

    - name: Set up Android NDK 25.2
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install SDK components
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    # ============ ИСПРАВЛЕНИЕ 1: AndroidManifest.xml ============
    - name: Fix AndroidManifest.xml
      run: |
        cat > AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">

            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

            <application
                android:icon="@drawable/ic_launcher"
                android:label="@string/app_name"
                android:theme="@style/Theme.DroidGEN"
                android:allowBackup="true">

                <activity
                    android:name=".Main"
                    android:label="@string/app_name"
                    android:configChanges="orientation|keyboardHidden|screenSize"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

            </application>

        </manifest>
        EOF

    # ============ ИСПРАВЛЕНИЕ 2: Ресурсы ============
    - name: Create missing resources
      run: |
        mkdir -p res/values
        mkdir -p res/drawable

        cat > res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">DroidGEN</string>
            <string name="loadRomButtonLabel">Load ROM</string>
            <string name="resumeButtonLabel">Resume</string>
            <string name="settingButtonLabel">Settings</string>
            <string name="exitButtonLabel">Exit</string>
            <string name="package_name">com.droidhits.genesisdroid</string>
        </resources>
        EOF

        cat > res/values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.DroidGEN" parent="android:Theme.Light.NoTitleBar">
                <item name="android:windowBackground">@android:color/black</item>
            </style>
        </resources>
        EOF

        cat > res/drawable/ic_launcher.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="rectangle">
            <solid android:color="#FF4444" />
            <corners android:radius="8dp" />
            <padding android:left="4dp" android:top="4dp" android:right="4dp" android:bottom="4dp" />
        </shape>
        EOF

    # ============ ИСПРАВЛЕНИЕ 3: Java-код (EmuActivity) ============
    - name: Fix EmuActivity.java
      run: |
        cat > src/com/droidhits/genesisdroid/EmuActivity.java << 'EOF'
        package com.droidhits.genesisdroid;

        import android.app.Activity;
        import android.os.Bundle;
        import android.view.Menu;
        import android.view.MenuItem;

        public class EmuActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }

            @Override
            public boolean onCreateOptionsMenu(Menu menu) {
                return true;
            }

            @Override
            public boolean onOptionsItemSelected(MenuItem item) {
                int id = item.getItemId();
                
                if (id == R.id.menuMenu) {
                    return true;
                } else if (id == R.id.menuSettings) {
                    return true;
                } else if (id == R.id.menuLoadROM) {
                    return true;
                } else if (id == R.id.menuSelectState) {
                    return true;
                } else if (id == R.id.menuLoadState) {
                    return true;
                } else if (id == R.id.menuSaveState) {
                    return true;
                } else if (id == R.id.menuResetGame) {
                    return true;
                } else if (id == R.id.menuState0) {
                    return true;
                } else if (id == R.id.menuState1) {
                    return true;
                } else if (id == R.id.menuState2) {
                    return true;
                } else if (id == R.id.menuState3) {
                    return true;
                } else if (id == R.id.menuState4) {
                    return true;
                } else if (id == R.id.menuState5) {
                    return true;
                } else if (id == R.id.menuState6) {
                    return true;
                } else if (id == R.id.menuState7) {
                    return true;
                } else if (id == R.id.menuState8) {
                    return true;
                } else if (id == R.id.menuState9) {
                    return true;
                }
                return super.onOptionsItemSelected(item);
            }
        }
        EOF

    # ============ ИСПРАВЛЕНИЕ 4: MainActivity.java (package_name) ============
    - name: Fix MainActivity.java
      run: |
        sed -i 's|getString(R.string.package_name)|"com.droidhits.genesisdroid"|g' src/com/droidhits/genesisdroid/MainActivity.java

    # ============ ИСПРАВЛЕНИЕ 5: CLOCK_REALTIME_HR ============
    - name: Fix CLOCK_REALTIME_HR in native code
      run: |
        find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) -exec sed -i 's/CLOCK_REALTIME_HR/CLOCK_REALTIME/g' {} \;

    # ============ ИСПРАВЛЕНИЕ 6: Android.mk (разделяем флаги C и C++) ============
    - name: Fix Android.mk for C and C++ flags
      run: |
        # Убираем -std=c99 из общих флагов
        sed -i 's/LOCAL_CFLAGS += -std=c99//g' jni/Android.mk
        sed -i 's/LOCAL_CFLAGS := -std=c99//g' jni/Android.mk
        
        # Добавляем правильные флаги для C и C++
        # Если есть LOCAL_CFLAGS, добавляем -std=c99
        if grep -q "LOCAL_CFLAGS" jni/Android.mk; then
          sed -i 's/LOCAL_CFLAGS += /LOCAL_CFLAGS += -std=c99 /g' jni/Android.mk
          sed -i 's/LOCAL_CFLAGS := /LOCAL_CFLAGS := -std=c99 /g' jni/Android.mk
        else
          echo "LOCAL_CFLAGS := -std=c99 -fPIC" >> jni/Android.mk
        fi
        
        # Добавляем LOCAL_CPPFLAGS для C++ файлов
        if ! grep -q "LOCAL_CPPFLAGS" jni/Android.mk; then
          echo "LOCAL_CPPFLAGS := -std=c++11 -fPIC" >> jni/Android.mk
        else
          sed -i 's/LOCAL_CPPFLAGS += /LOCAL_CPPFLAGS += -std=c++11 /g' jni/Android.mk
          sed -i 's/LOCAL_CPPFLAGS := /LOCAL_CPPFLAGS := -std=c++11 /g' jni/Android.mk
        fi

    # ============ ИСПРАВЛЕНИЕ 7: Application.mk ============
    - name: Create Application.mk
      run: |
        cat > jni/Application.mk << 'EOF'
        APP_ABI := armeabi-v7a
        APP_PLATFORM := android-21
        APP_CFLAGS += -std=c99 -fPIC
        APP_CPPFLAGS += -std=c++11 -fPIC
        APP_LDFLAGS += -fPIC
        APP_STL := c++_static
        EOF

    # ============ СБОРКА НАТИВНОГО КОДА ============
    - name: Build native code with NDK
      run: |
        cd jni
        $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk NDK_APPLICATION_MK=Application.mk

    # ============ ПРОВЕРКА НА TEXT RELOCATIONS ============
    - name: Check for text relocations
      run: |
        echo "Checking for TEXTREL in .so files..."
        find . -name "*.so" -exec sh -c 'echo "Checking {}"; readelf --dynamic {} | grep -i TEXTREL || echo "✅ No TEXTREL found in {}"' \;

    # ============ СОЗДАНИЕ GRADLE WRAPPER ============
    - name: Create Gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        cat > gradlew << 'EOF'
        #!/bin/sh
        exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
        EOF
        chmod +x gradlew

    # ============ СОЗДАНИЕ GRADLE BUILD FILES ============
    - name: Create Gradle build files
      run: |
        cat > settings.gradle << 'EOF'
        rootProject.name = "DroidGEN"
        EOF

        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.7.2'
            }
        }

        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }

        apply plugin: 'com.android.application'

        android {
            namespace 'com.droidhits.genesisdroid'
            compileSdk 34

            defaultConfig {
                applicationId "com.droidhits.genesisdroid"
                minSdk 17
                targetSdk 34
                ndkVersion '25.2.9519653'
                
                externalNativeBuild {
                    ndkBuild {
                        arguments "NDK_APPLICATION_MK:=Application.mk"
                        cFlags "-std=c99 -fPIC"
                        cppFlags "-std=c++11 -fPIC"
                        ldFlags "-fPIC"
                    }
                }
            }

            sourceSets {
                main {
                    manifest.srcFile 'AndroidManifest.xml'
                    java.srcDirs = ['src']
                    res.srcDirs = ['res']
                    assets.srcDirs = ['assets']
                    jniLibs.srcDirs = ['libs']
                }
            }

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt')
                }
            }
        }

        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.jar'])
        }
        EOF

    # ============ ФИНАЛЬНАЯ СБОРКА ============
    - name: Build with Gradle
      run: |
        ./gradlew assembleDebug --no-daemon

    # ============ ЗАГРУЗКА АРТЕФАКТА ============
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: DroidGEN-Gradle-Fixed
        path: build/outputs/apk/debug/*.apk

    # ============ ДОПОЛНИТЕЛЬНО: ЗАГРУЗКА .so ДЛЯ ОТЛАДКИ ============
    - name: Upload native libraries for debugging
      uses: actions/upload-artifact@v4
      with:
        name: Native-Libraries
        path: libs/**/*.so
