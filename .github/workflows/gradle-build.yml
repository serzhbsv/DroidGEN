name: Build DroidGEN with Gradle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        SKIP_JDK_VERSION_CHECK: true

    - name: Set up Android NDK 25.2
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install SDK components
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    # ============ КЛЮЧ ДЛЯ ПОДПИСИ ============
    - name: Setup debug keystore
      run: |
        # Проверяем, есть ли ключ в репозитории
        if [ -f debug.keystore ]; then
          echo "✅ Using existing debug.keystore"
        else
          echo "🔄 Generating new debug.keystore"
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US" \
            -storepass android -keypass android
        fi
        
        # Копируем в системную папку
        mkdir -p ~/.android
        cp debug.keystore ~/.android/debug.keystore

    - name: Upload debug keystore as artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-keystore
        path: debug.keystore
        retention-days: 30

    # ============ СБОРКА ============
    - name: Fix CLOCK_REALTIME_HR in native code
      run: |
        find jni -type f \( -name "*.c" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) -exec sed -i 's/CLOCK_REALTIME_HR/CLOCK_REALTIME/g' {} \;

    - name: Increment version code
      run: |
        if grep -q "versionCode" build.gradle; then
          OLD_CODE=$(grep -o "versionCode [0-9]*" build.gradle | head -1 | awk '{print $2}')
          NEW_CODE=$((OLD_CODE + 1))
          echo "Version code: $OLD_CODE -> $NEW_CODE"
          sed -i "s/versionCode $OLD_CODE/versionCode $NEW_CODE/" build.gradle
        fi

    - name: Clean build cache
      run: |
        rm -rf build/intermediates/cxx
        rm -rf .cxx

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: DroidGEN-debug
        path: build/outputs/apk/debug/*.apk